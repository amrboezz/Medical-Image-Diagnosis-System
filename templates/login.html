<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediDiagnostic Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ui-extras.css') }}">
    <style>
        [data-anim] { opacity: 0; will-change: transform, opacity; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-900">

{% set bg_url = url_for('static', filename='img/login_background.png') %}
<div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat font-sans" style="background-image: url('{{ bg_url }}');"></div>

    <div class="absolute inset-0 z-10 bg-blue-900/50"></div>


    <div data-anim="card" class="relative z-20 p-6 md:p-8 m-4 md:m-0 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100 backdrop-blur-sm bg-white">

        <div class="text-center mb-8">
            <div data-anim="logo" class="bg-blue-600 w-12 h-12 rounded-lg flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            </div>
            <h1 data-anim="title" class="text-2xl font-bold text-slate-800">MediDiagnostic</h1>
        </div>

<form action="/" method="POST" class="space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% if error %}
    <div data-anim="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">
        <span class="block sm:inline">{{ error }}</span>
    </div>
    {% endif %}

    <div data-anim="field">
        <label class="block text-sm font-medium text-slate-700 mb-1">Username / ID</label>
        <input type="text" name="username" required
               class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-slate-700">
    </div>

    <div data-anim="field">
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-slate-700">
    </div>

    <div data-anim="field" class="flex items-center justify-between text-sm">
    </div>

    <button data-anim="button" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition transform active:scale-95">
        Login
    </button>
</form>


    </div>

    <script id="ui-flash-data" type="application/json">{{ get_flashed_messages(with_categories=true) | tojson }}</script>
    <script>window.UI_ROLE = "guest";</script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/gsap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
